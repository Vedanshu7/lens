name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build
        run: go build -tags "lens_grpc lens_memberlist" ./...

      - uses: github/codeql-action/analyze@v4
