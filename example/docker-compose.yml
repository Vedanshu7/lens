# Lens local demo stack
#
# Starts two app replicas each with a dedicated Lens sidecar, Redis (persistence
# + memberlist bootstrap), and PostgreSQL (SQL observability).
#
# Usage:
#   docker compose up --build
#
# Switch to NATS transport:
#   docker compose -f docker-compose.yml -f docker-compose.nats.yml up --build
#
# Ports exposed on localhost:
#   app-1  HTTP  :8081
#   app-2  HTTP  :8082
#   lens-1 HTTP  :8901  (sidecar API + Prometheus metrics)
#   lens-2 HTTP  :8902
#   redis        :6379
#   postgres     :5432

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lens
      POSTGRES_PASSWORD: lens
      POSTGRES_DB: lens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens"]
      interval: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # App replicas (the demo target service)
  # ---------------------------------------------------------------------------

  app-1:
    build:
      context: ./app
    environment:
      APP_SERVICE: demo
      APP_INSTANCE: app-1
      LENS_URL: http://lens-1:8900
    ports:
      - "8081:8080"
    depends_on:
      lens-1:
        condition: service_started

  app-2:
    build:
      context: ./app
    environment:
      APP_SERVICE: demo
      APP_INSTANCE: app-2
      LENS_URL: http://lens-2:8900
    ports:
      - "8082:8080"
    depends_on:
      lens-2:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Lens sidecars
  # ---------------------------------------------------------------------------

  lens-1:
    build:
      context: ../
      args:
        LENS_TAGS: "lens_grpc lens_memberlist"
    volumes:
      - ./lens.yaml:/etc/lens/lens.yaml:ro
    environment:
      LENS_TARGET_URL: http://app-1:8080
      LENS_ADVERTISE_ADDR: lens-1
    ports:
      - "8901:8900"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  lens-2:
    build:
      context: ../
      args:
        LENS_TAGS: "lens_grpc lens_memberlist"
    volumes:
      - ./lens.yaml:/etc/lens/lens.yaml:ro
    environment:
      LENS_TARGET_URL: http://app-2:8080
      LENS_ADVERTISE_ADDR: lens-2
    ports:
      - "8902:8900"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
