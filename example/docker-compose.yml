# Lens local demo stack — 10 app replicas each with a dedicated Lens sidecar.
#
# Usage:
#   docker compose up --build -d
#
# Switch to NATS transport:
#   docker compose -f docker-compose.yml -f docker-compose.nats.yml up --build -d
#
# Ports exposed on localhost:
#   app-N  HTTP  :808N   (N=1..9, app-10 -> :8090)
#   lens-N HTTP  :890N   (N=1..9, lens-10 -> :8910)
#   redis        :6379
#   postgres     :5432

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lens
      POSTGRES_PASSWORD: lens
      POSTGRES_DB: lens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens"]
      interval: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # App + Sidecar pairs 1-10
  # ---------------------------------------------------------------------------

  app-1:
    build: { context: ./app }
    environment: { APP_SERVICE: demo, APP_INSTANCE: app-1, LENS_URL: "http://lens-1:8900" }
    ports: ["8081:8080"]
    depends_on: { lens-1: { condition: service_started } }

  lens-1:
    build: { context: ../, args: { LENS_TAGS: "lens_grpc lens_memberlist" } }
    volumes: ["./lens.yaml:/etc/lens/lens.yaml:ro"]
    environment: { LENS_TARGET_URL: "http://app-1:8080", LENS_ADVERTISE_ADDR: lens-1 }
    ports: ["8901:8900"]
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  app-2:
