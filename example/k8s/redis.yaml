# Single-node Redis for the lens-demo namespace.
# For production on EKS, remove this file and point lens.yaml at your
# ElastiCache endpoint: persistence.config.addr = "<cluster>.cache.amazonaws.com:6379"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lens-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lens-demo
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
