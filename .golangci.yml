version: "2"

linters:
  enable:
    - bodyclose
    - exhaustive
    - misspell
    - noctx
    - revive
    - unconvert
    - unparam
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    revive:
      rules:
        - name: error-return
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: var-naming
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: internal/proto/
        linters: [errcheck, govet, revive, staticcheck, unused]
      - path: _test\.go
        linters: [errcheck, noctx, unparam]
      - path: test/testutil/
        linters: [revive, unparam]
      - path: example/
        linters: [noctx, revive]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Vedanshu7/lens
  exclusions:
    generated: lax
